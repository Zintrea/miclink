<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>miclink — Audio Diagnostics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-start { background: #007aff; color: white; }
        .btn-start:active { background: #005bbf; }
        .btn-stop { background: #ff453a; color: white; }
        .btn-stop:active { background: #cc3529; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .status-box {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            background: #2a2a2a;
            font-size: 13px;
            color: #aaa;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }
        .status-box.pass { color: #32d74b; background: #1a3a1a; }
        .status-box.fail { color: #ff453a; background: #3a1a1a; }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <span style="font-size:48px">🔬</span>
        <h1>miclink Diagnostics</h1>
        <p class="subtitle">Test ScriptProcessorNode on this device</p>

        <button id="action-btn" class="btn btn-start">
            Start Test
        </button>

        <div id="status" class="status-box">Status: Ready</div>
        <div id="info" class="info-row"></div>
    </div>

    <script>
        (function() {
            'use strict';

            const btn = document.getElementById('action-btn');
            const statusEl = document.getElementById('status');
            const infoEl = document.getElementById('info');

            let audioContext = null;
            let stream = null;
            let processor = null;
            let isRunning = false;

            function setStatus(text, type) {
                statusEl.textContent = text;
                statusEl.className = 'status-box';
                if (type) statusEl.classList.add(type);
            }

            function runTest() {
                const constraints = {
                    audio: {
                        sampleRate: 48000,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                    }
                };

                setStatus('Requesting mic...');
                btn.disabled = true;
                btn.textContent = 'Starting...';

                navigator.mediaDevices.getUserMedia(constraints)
                    .then(async (mediaStream) => {
                        stream = mediaStream;

                        // Get mic info
                        const track = stream.getAudioTracks()[0];
                        const settings = track.getSettings();
                        const hwRate = settings.sampleRate || 'unknown';

                        // Create AudioContext
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        if (audioContext.state === 'suspended') {
                            await audioContext.resume();
                        }

                        const ctxRate = audioContext.sampleRate;
                        infoEl.textContent = `Mic HW: ${hwRate} Hz | AudioContext: ${ctxRate} Hz`;

                        // Connect audio graph
                        const source = audioContext.createMediaStreamSource(stream);
                        const bufferSize = 2048;
                        processor = audioContext.createScriptProcessor(bufferSize, 1, 1);
                        source.connect(processor);

                        const silentGain = audioContext.createGain();
                        silentGain.gain.value = 0;
                        processor.connect(silentGain);
                        silentGain.connect(audioContext.destination);

                        let frameCount = 0;
                        let totalSamples = 0;

                        processor.onaudioprocess = (e) => {
                            const input = e.inputBuffer.getChannelData(0);
                            frameCount++;
                            totalSamples += input.length;

                            // Also write to output buffer (required by some iOS versions)
                            const output = e.outputBuffer.getChannelData(0);
                            for (let i = 0; i < output.length; i++) {
                                output[i] = 0;
                            }

                            if (frameCount <= 3) {
                                // Stats for first few frames
                                let min = 1, max = -1, sum = 0;
                                for (let i = 0; i < input.length; i++) {
                                    const s = input[i];
                                    if (s < min) min = s;
                                    if (s > max) max = s;
                                    sum += Math.abs(s);
                                }
                                const avg = sum / input.length;
                                console.log(`Frame ${frameCount}: ${input.length} samples, range [${min.toFixed(4)}, ${max.toFixed(4)}], avg=${avg.toFixed(6)}`);
                            }
                        };

                        isRunning = true;
                        btn.textContent = 'Stop Test';
                        btn.className = 'btn btn-stop';
                        btn.disabled = false;
                        setStatus('✅ Audio graph running — check Safari Web Inspector console for sample stats', 'pass');
                    })
                    .catch((err) => {
                        console.error('Error:', err);
                        setStatus('❌ ' + err.message, 'fail');
                        btn.textContent = 'Start Test';
                        btn.className = 'btn btn-start';
                        btn.disabled = false;
                    });
            }

            function stopTest() {
                isRunning = false;
                if (processor) { processor.disconnect(); processor = null; }
                if (audioContext) { audioContext.close(); audioContext = null; }
                if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
                setStatus('Stopped');
                btn.textContent = 'Start Test';
                btn.className = 'btn btn-start';
                btn.disabled = false;
            }

            btn.addEventListener('click', () => {
                if (isRunning) stopTest();
                else runTest();
            });
        })();
    </script>
</body>
</html>
