<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>miclink — HQ Mobile Mic</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-user-select: none;
            user-select: none;
        }
        .container {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .mic-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-start {
            background: #007aff;
            color: white;
        }
        .btn-start:active { background: #005bbf; }
        .btn-stop {
            background: #ff453a;
            color: white;
        }
        .btn-stop:active { background: #cc3529; }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .status-box {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            background: #2a2a2a;
            font-size: 13px;
            color: #aaa;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }
        .status-box.connected { color: #32d74b; background: #1a3a1a; }
        .status-box.error { color: #ff453a; background: #3a1a1a; }
        .status-box.streaming { color: #64d2ff; background: #1a2a3a; }
        .server-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
        }
        .server-input::placeholder { color: #666; }
        .server-input:focus { outline: none; border-color: #007aff; }
        .label { color: #888; font-size: 12px; margin-bottom: 4px; display: block; }
        .error-detail { font-size: 11px; color: #ff6b6b; margin-top: 8px; padding: 8px; background: #2a1a1a; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <span class="mic-icon">🎙️</span>
        <h1>miclink</h1>
        <p class="subtitle">Stream your iPad/phone mic to your PC</p>

        <label class="label">Server IP Address</label>
        <input type="text" id="server-ip" class="server-input"
               placeholder="e.g. 192.168.1.100"
               value="" autocomplete="off" autocorrect="off" spellcheck="false">

        <button id="action-btn" class="btn btn-start" disabled>
            Start Microphone
        </button>

        <div id="status" class="status-box">Status: Disconnected</div>
        <div id="error-detail" class="error-detail"></div>
    </div>

    <script>
        (function() {
            'use strict';

            const btn = document.getElementById('action-btn');
            const statusEl = document.getElementById('status');
            const errorDetail = document.getElementById('error-detail');
            const ipInput = document.getElementById('server-ip');

            let socket = null;
            let audioContext = null;
            let stream = null;
            let processor = null;
            let isStreaming = false;

            // --- Auto-detect IP ---
            // Try to get PC IP via WebRTC trick (works on most browsers)
            function detectServerIP() {
                // Common local IP ranges — user can also type manually
                const saved = localStorage.getItem('miclink-server-ip');
                if (saved) {
                    ipInput.value = saved;
                    btn.disabled = false;
                    return;
                }
                // Try RTCPeerConnection trick to find local IP
                try {
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel('');
                    pc.createOffer().then(offer => pc.setLocalDescription(offer));
                    pc.onicecandidate = (e) => {
                        if (!e.candidate) return;
                        const match = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
                        if (match) {
                            const parts = match[1].split('.');
                            if (parts[0] === '192' || parts[0] === '10' || (parts[0] === '172' && parseInt(parts[1]) >= 16 && parseInt(parts[1]) <= 31)) {
                                const guess = match[1].replace(/\.\d+$/, '.1');
                                ipInput.placeholder = `e.g. ${guess}`;
                            }
                        }
                    };
                    setTimeout(() => pc.close(), 3000);
                } catch(e) {}
                btn.disabled = false;
            }

            // --- UI Updates ---
            function setStatus(text, type) {
                statusEl.textContent = text;
                statusEl.className = 'status-box';
                if (type) statusEl.classList.add(type);
            }

            function showError(msg, detail) {
                setStatus(msg, 'error');
                if (detail) {
                    errorDetail.textContent = detail;
                    errorDetail.style.display = 'block';
                } else {
                    errorDetail.style.display = 'none';
                }
            }

            // --- WebSocket + Audio ---
            function parseServerAddress(input) {
                // Accept: "IP", "IP:PORT", "ws://IP:PORT", "ws://IP"
                let ip = input;
                // Same port as the page we're on (HTTPS + WSS on one port),
                // fallback to 8765 for non-secure / file:// mode
                let port = parseInt(window.location.port, 10) || 8765;

                // Strip ws:// prefix
                ip = ip.replace(/^ws:\/\//i, '');
                // Strip trailing port if present
                const portMatch = ip.match(/^(.*):(\d+)$/);
                if (portMatch) {
                    ip = portMatch[1];
                    port = parseInt(portMatch[2], 10);
                }

                // Validate IP format
                if (!/^\d+\.\d+\.\d+\.\d+$/.test(ip)) {
                    return null;
                }

                return { ip, port };
            }

            function startStreaming() {
                const raw = ipInput.value.trim();
                if (!raw) {
                    showError('Please enter the server IP address');
                    return;
                }

                const addr = parseServerAddress(raw);
                if (!addr) {
                    showError('Invalid IP format (e.g. 192.168.1.100 or 172.20.10.2:8765)');
                    return;
                }

                // Save for next time
                localStorage.setItem('miclink-server-ip', raw);

                setStatus('Requesting microphone...');
                btn.disabled = true;
                btn.textContent = 'Requesting Mic...';

                // Step 1: Request mic FIRST (in user gesture context for iOS!)
                const constraints = {
                    audio: {
                        sampleRate: 48000,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                    }
                };

                navigator.mediaDevices.getUserMedia(constraints)
                    .then(async (mediaStream) => {
                        stream = mediaStream;

                        // Get actual sample rate from the device
                        const track = stream.getAudioTracks()[0];
                        const settings = track.getSettings();
                        const actualRate = settings.sampleRate || 48000;
                        console.log(`Mic: ${track.label} @ ${actualRate}Hz`);

                        // Step 2: Set up audio pipeline (still in user gesture chain)
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();

                        // iOS Safari starts AudioContext in 'suspended' state
                        if (audioContext.state === 'suspended') {
                            await audioContext.resume();
                        }
                        console.log('AudioContext state:', audioContext.state, '@', actualRate, 'Hz');

                        const source = audioContext.createMediaStreamSource(stream);
                        const bufferSize = 2048;
                        processor = audioContext.createScriptProcessor(bufferSize, 1, 1);
                        source.connect(processor);

                        // CRITICAL for iOS Safari: ScriptProcessorNode's onaudioprocess
                        // only fires when the output is connected to destination.
                        // Use GainNode(0) to complete the audio graph without local playback.
                        const silentGain = audioContext.createGain();
                        silentGain.gain.value = 0;
                        processor.connect(silentGain);
                        silentGain.connect(audioContext.destination);

                        // Step 3: Now connect WebSocket
                        setStatus('Connecting...');
                        btn.textContent = 'Connecting...';

                        // Auto-detect: use WSS if page is HTTPS (iOS requirement)
                        const wsProto = window.location.protocol === 'https:' ? 'wss' : 'ws';
                        const wsUrl = `${wsProto}://${addr.ip}:${addr.port}`;
                        socket = new WebSocket(wsUrl);

                        let totalBytes = 0;
                        const startTime = Date.now();

                        socket.onopen = () => {
                            // Send sample rate to server first (critical for sync!)
                            socket.send(JSON.stringify({ sample_rate: actualRate }));

                            setStatus('Connected — streaming...', 'connected');
                            isStreaming = true;
                            btn.textContent = 'Stop Streaming';
                            btn.className = 'btn btn-stop';
                            btn.disabled = false;

                            // Step 4: Start sending audio
                            processor.onaudioprocess = (e) => {
                                const input = e.inputBuffer.getChannelData(0);
                                const pcm16 = new Int16Array(input.length);

                                for (let i = 0; i < input.length; i++) {
                                    // Clamp float32 [-1, 1] → int16 [-32768, 32767]
                                    const sample = Math.max(-1, Math.min(1, input[i]));
                                    pcm16[i] = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                                }

                                if (socket && socket.readyState === WebSocket.OPEN) {
                                    socket.send(pcm16.buffer);
                                    totalBytes += pcm16.byteLength;
                                }
                            };

                            // Update status periodically with bitrate info
                            const bitrateInterval = setInterval(() => {
                                if (!isStreaming) {
                                    clearInterval(bitrateInterval);
                                    return;
                                }
                                const elapsed = (Date.now() - startTime) / 1000;
                                if (elapsed > 0) {
                                    const kbps = (totalBytes * 8 / 1000 / elapsed).toFixed(1);
                                    setStatus(`Streaming @ ${kbps} kbps (${actualRate} Hz)`, 'streaming');
                                }
                            }, 2000);
                        };

                        socket.onerror = () => {
                            showError('Connection failed — check that you used:');
                            errorDetail.textContent = 'Open https://172.20.10.2:8443/web-client.html on Safari, enter IP: 172.20.10.2';
                            errorDetail.style.display = 'block';
                            resetButton();
                            cleanup();
                        };

                        socket.onclose = (event) => {
                            if (isStreaming) {
                                showError('Connection lost');
                            } else {
                                setStatus('Disconnected');
                            }
                            cleanup();
                        };
                    })
                    .catch((err) => {
                        console.error('getUserMedia error:', err);
                        let msg = 'Microphone access denied';
                        let detail = err.message;
                        if (err.name === 'NotAllowedError') {
                            msg = 'Please allow microphone access in Safari';
                            detail = 'Go to Settings > Safari > Camera & Microphone Access, or use HTTPS';
                        } else if (err.name === 'NotFoundError') {
                            msg = 'No microphone found on this device';
                        }
                        showError(msg, detail);
                        resetButton();
                        cleanup();
                    });
            }

            function stopStreaming() {
                cleanup();
                setStatus('Stopped');
                resetButton();
            }

            function resetButton() {
                btn.textContent = 'Start Microphone';
                btn.className = 'btn btn-start';
                btn.disabled = false;
            }

            function cleanup() {
                isStreaming = false;

                if (processor) {
                    processor.disconnect();
                    processor = null;
                }
                if (audioContext) {
                    audioContext.close().catch(() => {});
                    audioContext = null;
                }
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                }
                if (socket) {
                    // Remove handlers to avoid re-triggering onclose
                    socket.onopen = null;
                    socket.onerror = null;
                    socket.onclose = null;
                    if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
                        socket.close();
                    }
                    socket = null;
                }
            }

            // --- Button handler ---
            btn.addEventListener('click', () => {
                if (isStreaming) {
                    stopStreaming();
                } else {
                    startStreaming();
                }
            });

            // Allow Enter key to submit IP
            ipInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !isStreaming) {
                    startStreaming();
                }
            });

            // --- Init ---
            detectServerIP();
        })();
    </script>
</body>
</html>
